<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游戏中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background: linear-gradient(rgba(20,11,46,0.7),rgba(42,24,82,0.8));
  background-image: url(bg.jpg);
  background-repeat: no-repeat;
  background-position: center;
  background-size: cover;
  background-attachment: fixed;
  color:#fff;
  font-family:微软雅黑;
  text-align:center;
  padding:30px 20px;
  min-height:100vh;
}
.main{
  max-width:700px;
  margin:0 auto;
  background:rgba(0,0,0,0.5);
  border-radius:20px;
  padding:40px 20px;
  border:2px solid #8a65d8
}
h1{
  font-size:36px;
  color:#ffd700;
  margin-bottom:20px
}
.info{
  font-size:16px;
  color:#eee;
  margin-bottom:30px;
  line-height:1.7
}
/* 分类标题 */
.game-title{
  color:#ffd700;
  font-size:20px;
  margin:25px 0 15px;
  padding-bottom:8px;
  border-bottom:1px dashed #8a65d8;
}
.btn{
  display:block;
  width:85%;
  height:55px;
  line-height:55px;
  background:#7a57d8;
  color:#fff;
  font-size:18px;
  border-radius:12px;
  margin:14px auto;
  text-decoration:none
}
.btn:hover{
  background:#6342c2
}

/* 弹窗样式 */
.mask{
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index:999;
}
.popup{
  width:90%; max-width:400px;
  background:#2a1852;
  border:2px solid #8a65d8;
  border-radius:15px;
  padding:30px 20px;
  text-align:center;
  color:#fff;
}
.popup h3{
  color:#ffd700;
  margin-bottom:15px;
  font-size:20px;
}
.popup p{
  font-size:15px;
  line-height:1.7;
  margin-bottom:20px;
}
.closeBtn{
  padding:10px 30px;
  background:#7a57d8;
  color:#fff;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- 开场弹窗 -->
<div class="mask" id="mask">
  <div class="popup">
    <h3>欢迎来到游戏平台</h3>
    <p>本站汇聚多款热门手游<br>点击对应按钮即可下载/进入<br>链接持续更新，敬请留意</p>
    <p>有问题联系客服Q:3128563612<br>链接进不去联系客服</p>
    <button class="closeBtn" onclick="closePopup()">立即进入</button>
  </div>
</div>

<div class="main">
  <h1>热门手游下载平台</h1>
  <p class="info">海量精品手游 | 稳定入口 | 福利多多</p>

  <!-- 游戏分区，预留链接位置，后续直接替换href即可 -->
  <div class="game-group">
    <h2 class="game-title">🎮 热门手游专区</h2>
    <a href="https://1546503875-byte.github.io/33tian" class="btn" target="_blank">🐍生存33天</a>
    <a href="https://1546503875-byte.github.io/xianyu" class="btn" target="_blank">🐟️咸鱼之王16圣🐟</a>
    <a href="https://www.kdocs.cn/l/cekA1TKfuX20" class="btn" target="_blank">👿妖怪金手指 </a>
    <a href="https://1546503875-byte.github.io/zxianyu" class="btn" target="_blank">꧁咸鱼之王国际服꧂ </a>
    <a href="https://1546503875-byte.github.io/shaosan2" class="btn" target="_blank">🔥少年三国志2</a>
    <a href="https://1546503875-byte.github.io/zahuodian" class="btn" target="_blank">🚧时光杂货店</a>

    <p>更多游戏敬请期待，链接持续更新</p>
   
  </div>

</div>

<script>
// 关闭弹窗
function closePopup(){
  document.getElementById('mask').style.display = 'none';
}
</script>

</body>
</html>
